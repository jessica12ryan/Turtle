name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose build
      - run: docker compose up -d
      - run: docker compose exec -T app php -r 'require "/var/www/html/www/autoload.php"; echo "App loads OK\n";'
      - run: docker compose down
