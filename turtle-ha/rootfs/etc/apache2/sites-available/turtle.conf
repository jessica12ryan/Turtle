<VirtualHost *:8099>
    ServerName turtle.local
    DocumentRoot /var/www/turtle/www

    <Directory /var/www/turtle/www>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /data/logs/apache_error.log
    CustomLog /data/logs/apache_access.log combined
</VirtualHost>
