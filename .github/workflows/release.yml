name: Create Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3). Leave empty to auto-increment patch.'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            VER="${VER#v}"
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            LATEST="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            : "${MAJOR:=0}" "${MINOR:=0}" "${PATCH:=0}"
            echo "version=${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Update turtle-ha/config.yaml version
        run: |
          sed -i "s/^version:.*/version: \"${{ steps.version.outputs.version }}\"/" turtle-ha/config.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add turtle-ha/config.yaml
          git diff --staged --quiet || git commit -m "chore: bump HA add-on version to ${{ steps.version.outputs.version }}"
          git push origin HEAD

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Release v${{ steps.version.outputs.version }}"
          generate_release_notes: true

  build-ha-addon:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.19
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.19
          - arch: armv7
            platform: linux/arm/v7
            base: ghcr.io/home-assistant/armv7-base:3.19

    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.release.outputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./turtle-ha
          push: true
          platforms: ${{ matrix.platform }}
          build-args: BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/jessica12ryan/turtle/${{ matrix.arch }}:${{ needs.release.outputs.version }}
            ghcr.io/jessica12ryan/turtle/${{ matrix.arch }}:latest
